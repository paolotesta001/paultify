name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: # allow manual triggers from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # PWA icons are built from the SVG in scripts/, kept out of git.
      - run: npm run icons

      - name: Build
        env:
          # Project-pages URLs are /<repo-name>/ — base must match so asset
          # paths and the manifest's start_url line up.
          VITE_BASE: /${{ github.event.repository.name }}/
          # Empty by default = same-origin. Set this to a public helper URL
          # (Tailscale Funnel, VPS, etc.) if you want the deployed PWA to
          # download from a remote helper. Leave empty for play-only mode.
          VITE_HELPER_BASE: ${{ vars.HELPER_BASE }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
